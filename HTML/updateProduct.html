<!-- Update Product Modal -->
<div class="modal fade" id="updateProductModal" tabindex="-1" aria-labelledby="updateProductModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="updateProductModalLabel">Update Product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <!-- Update Product Form -->
                <form id="updateProductForm">
                    <div class="mb-3">
                        <label for="updateProductName" class="form-label">Product Name</label>
                        <input type="text" class="form-control" id="updateProductName" name="productName" required>
                    </div>
                    <div class="mb-3">
                        <label for="updateProductPrice" class="form-label">Product Price</label>
                        <input type="number" class="form-control" id="updateProductPrice" name="productPrice" required>
                    </div>
                    <div class="mb-3">
                        <label for="updateProductDescription" class="form-label">Product Description</label>
                        <textarea class="form-control" id="updateProductDescription" name="productDescription" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="updateProductBrand" class="form-label">Brand</label>
                        <input type="text" class="form-control" id="updateProductBrand" name="productBrand" required>
                    </div>
                    <div class="mb-3">
                        <label for="updateProductQuantity" class="form-label">Quantity</label>
                        <input type="number" class="form-control" id="updateProductQuantity" name="productQuantity" required>
                    </div>
                    <div class="mb-3">
                        <label for="updateProductCategory" class="form-label">Category</label>
                        <select class="form-select" id="updateProductCategory" name="productCategory" required>
                            <!-- Categories will be populated dynamically here -->
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="updateProductImage" class="form-label">Product Image</label>
                        <input type="file" class="form-control" id="updateProductImage" name="productImage">
                    </div>
                    <div class="mb-3">
                        <label for="updateProductSalePrice" class="form-label">Sale Price</label>
                        <input type="number" class="form-control" id="updateProductSalePrice" name="productSalePrice" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Update Product</button>
                </form>
            </div>
        </div>
    </div>
</div>
