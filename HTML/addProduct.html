
    <!-- Modal for Add Product -->
    <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addProductModalLabel">Add Product</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Add Product Form -->
                    <form id="addProductForm">
                        <div class="mb-3">
                            <label for="productName" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="productName" name="productName" >
                        </div>

                        <div class="mb-3">
                            <label for="productCategory" class="form-label">Product Category</label>
                            <input type="text" class="form-control" id="productCategory" name="productCategory" >
                        </div>

                        <div class="mb-3">
                            <label for="productPrice" class="form-label">Product Price</label>
                            <input type="number" class="form-control" id="productPrice" name="productPrice" >
                        </div>

                        <div class="mb-3">
                            <label for="salePrice" class="form-label">Sale Price</label>
                            <input type="number" class="form-control" id="salePrice" name="salePrice">
                        </div>

                        <div class="mb-3">
                            <label for="productDescription" class="form-label">Product Description</label>
                            <textarea class="form-control" id="productDescription" name="productDescription" rows="4"
                                ></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="productQuantity" class="form-label">Quantity</label>
                            <input type="number" class="form-control" id="productQuantity" name="productQuantity"
                                >
                        </div>

                        <div class="mb-3">
                            <label for="productBrand" class="form-label">Brand Name</label>
                            <input type="text" class="form-control" id="productBrand" name="productBrand" >
                        </div>

                        <div class="mb-3">
                            <label for="productImage" class="form-label">Product Image</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="imageOption" id="localImage"
                                    value="local" checked>
                                <label class="form-check-label" for="localImage">Choose from Local</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="imageOption" id="urlImage"
                                    value="url">
                                <label class="form-check-label" for="urlImage">Enter URL</label>
                            </div>
                            <input type="file" class="form-control mt-3" id="imageFile" name="imageFile"
                                accept="image/*">
                            <input type="url" class="form-control mt-3" id="imageUrl" name="imageUrl"
                                placeholder="Enter Image URL" style="display: none;">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Submit</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
